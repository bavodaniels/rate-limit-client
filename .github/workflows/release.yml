name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write  # Required for creating releases
  id-token: write  # For OIDC token generation (optional, for enhanced security)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract coverage from JaCoCo report
        id: coverage
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml')
          root = tree.getroot()
          counter = root.find(\".//counter[@type='LINE']\")
          if counter is not None:
              covered = float(counter.get('covered', 0))
              missed = float(counter.get('missed', 0))
              total = covered + missed
              if total > 0:
                  percentage = (covered / total) * 100
                  print(f'{percentage:.1f}')
              else:
                  print('0.0')
          else:
              print('0.0')
          ")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Update README with version and coverage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          COVERAGE="${{ steps.coverage.outputs.COVERAGE }}"

          # Update version badge
          sed -i "s|!\[Version\](https://img.shields.io/badge/version-.*-blue.svg)|![Version](https://img.shields.io/badge/version-$VERSION-blue.svg)|g" README.md

          # Update coverage badge with color based on percentage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          sed -i "s|!\[Coverage\](https://img.shields.io/badge/coverage-.*-.*\.svg)|![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}.svg)|g" README.md

      - name: Commit and push README updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: Update README badges for version ${{ steps.version.outputs.VERSION }} and coverage ${{ steps.coverage.outputs.COVERAGE }}%"
          git push origin HEAD:main

      - name: Find JAR file
        id: jar
        run: |
          JAR_FILE=$(find build/libs -name "rate-limit-client*.jar" -not -name "*-plain.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -n 1)
          echo "JAR_PATH=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Publish to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          set -e

          # First, build the distribution
          ./gradlew build -x test

          # Find artifacts
          JAR=$(find build/libs -name "rate-limit-client*.jar" -not -name "*-plain.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -n 1)
          SOURCES=$(find build/libs -name "*-sources.jar" | head -n 1)
          JAVADOC=$(find build/libs -name "*-javadoc.jar" | head -n 1)

          if [ -z "$JAR" ]; then
            echo "ERROR: Could not find JAR file"
            exit 1
          fi

          echo "JAR: $JAR"
          echo "SOURCES: $SOURCES"
          echo "JAVADOC: $JAVADOC"

          # Create publishing activity
          echo "Creating publishing activity..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.publishing.sonatype.com/api/v1/publisher/uploads \
            -H "Content-Type: application/json" \
            -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
            -d "{\"name\": \"rate-limit-client-${{ steps.version.outputs.VERSION }}\", \"description\": \"Release ${{ steps.version.outputs.VERSION }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Failed to create publishing activity (HTTP $HTTP_CODE)"
            exit 1
          fi

          UPLOAD_ID=$(echo "$BODY" | jq -r '.uploadId')

          if [ -z "$UPLOAD_ID" ] || [ "$UPLOAD_ID" = "null" ]; then
            echo "ERROR: Could not extract uploadId from response"
            exit 1
          fi

          echo "Upload ID: $UPLOAD_ID"

          # Upload each artifact
          for ARTIFACT in "$JAR" "$SOURCES" "$JAVADOC"; do
            if [ -f "$ARTIFACT" ]; then
              FILENAME=$(basename "$ARTIFACT")
              echo "Uploading $FILENAME..."

              UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.publishing.sonatype.com/api/v1/publisher/uploads/$UPLOAD_ID" \
                -H "Content-Type: application/octet-stream" \
                -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
                --data-binary "@$ARTIFACT")

              UPLOAD_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n 1)
              echo "Upload response code: $UPLOAD_CODE"

              if [ "$UPLOAD_CODE" != "204" ]; then
                echo "ERROR: Failed to upload $FILENAME (HTTP $UPLOAD_CODE)"
                echo "Response: $(echo "$UPLOAD_RESPONSE" | head -n -1)"
                exit 1
              fi
            fi
          done

          # Publish the upload (auto-release)
          echo "Publishing upload..."
          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.publishing.sonatype.com/api/v1/publisher/uploads/$UPLOAD_ID/publish" \
            -H "Content-Type: application/json" \
            -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
            -d "{\"publishingType\": \"AUTOMATIC\"}")

          PUBLISH_CODE=$(echo "$PUBLISH_RESPONSE" | tail -n 1)
          PUBLISH_BODY=$(echo "$PUBLISH_RESPONSE" | head -n -1)

          echo "Publish response code: $PUBLISH_CODE"
          echo "Publish response body: $PUBLISH_BODY"

          if [ "$PUBLISH_CODE" != "200" ]; then
            echo "ERROR: Failed to publish (HTTP $PUBLISH_CODE)"
            exit 1
          fi

          echo "Successfully published to Maven Central!"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.jar.outputs.JAR_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rate-limit-client-${{ steps.version.outputs.VERSION }}
          path: build/libs/*.jar
