name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract coverage from JaCoCo report
        id: coverage
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml')
          root = tree.getroot()
          counter = root.find(\".//counter[@type='LINE']\")
          if counter is not None:
              covered = float(counter.get('covered', 0))
              missed = float(counter.get('missed', 0))
              total = covered + missed
              if total > 0:
                  percentage = (covered / total) * 100
                  print(f'{percentage:.1f}')
              else:
                  print('0.0')
          else:
              print('0.0')
          ")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Update README with version and coverage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          COVERAGE="${{ steps.coverage.outputs.COVERAGE }}"

          # Update version badge
          sed -i "s|!\[Version\](https://img.shields.io/badge/version-.*-blue.svg)|![Version](https://img.shields.io/badge/version-$VERSION-blue.svg)|g" README.md

          # Update coverage badge with color based on percentage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          sed -i "s|!\[Coverage\](https://img.shields.io/badge/coverage-.*-.*\.svg)|![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}.svg)|g" README.md

      - name: Commit and push README updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: Update README badges for version ${{ steps.version.outputs.VERSION }} and coverage ${{ steps.coverage.outputs.COVERAGE }}%"
          git push origin HEAD:main

      - name: Find JAR file
        id: jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" -not -name "*-plain.jar" | head -n 1)
          echo "JAR_PATH=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.jar.outputs.JAR_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rate-limit-client-${{ steps.version.outputs.VERSION }}
          path: build/libs/*.jar
